<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Time Keeper</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont;
  background: green;
  color: white;
  overflow: hidden;
}

.progress-container {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.2);
  position: absolute;
  top: 0;
}
.progress-bar {
  height: 100%;
  width: 100%;
  background: lime;
  transition: width 1s linear;
}

#over {
  position: absolute;
  top: 5px;
  left: 10px;
  font-size: 4vw;
  opacity: 0.8;
}

/* 시간 중앙 */
#time {
  font-size: 15vw;
  font-weight: 700;
  text-align: center;
  margin-bottom: 5vh;
  word-break: break-all;
}

/* 프리셋 버튼 */
.preset {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 5vh;
}
.preset button {
  font-size: 4vw;
  padding: 2vh 3vw;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: white;
}
.preset button.active {
  background: white;
  color: black;
}

/* START/STOP/RESET 버튼 */
#startStopBtn {
  font-size: 6vw;
  width: 90%;
  padding: 2vh 0;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff6a00, #ee0979);
  color: white;
  border: none;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  transition: transform 0.1s;
}
#startStopBtn:active {
  transform: scale(0.97);
}

</style>
</head>
<body>

<div class="progress-container">
  <div class="progress-bar" id="progress"></div>
</div>

<!-- OVER 표시 -->
<div id="over"></div>

<!-- 시간 중앙 -->
<div id="time">01:00</div>

<!-- 프리셋 -->
<div class="preset">
  <button onclick="quickStart(60,this)" class="active">1m</button>
  <button onclick="quickStart(120,this)">2m</button>
  <button onclick="quickStart(180,this)">3m</button>
  <button onclick="quickStart(240,this)">4m</button>
  <button onclick="quickStart(300,this)">5m</button>
</div>

<!-- START/STOP/RESET 버튼 -->
<div>
  <button id="startStopBtn" onclick="toggleStartStop()">START</button>
</div>

<script>
let total = 60; // 초기 1분
let initial = 60;
let overtime = 0;
let interval = null;
let running = false;
let beepPlayed = false;
let wakeLock = null;
let lastPreset = 60;
let stopState = false;

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock?.request('screen');
    if(wakeLock) wakeLock.addEventListener('release', ()=>console.log('Wake Lock released'));
  } catch(e){ console.log('Wake Lock failed:',e); }
}

function format(sec){
  let m = Math.floor(sec/60);
  let s = sec%60;
  return String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}

function updateDisplay(){
  document.getElementById("time").innerText = format(Math.max(0,total));
  document.getElementById("over").innerText = overtime>0 ? "OVER "+format(overtime) : "";

  let percent = total > 0 ? (total/initial)*100 : 0;
  document.getElementById("progress").style.width = percent + "%";

  if(total<=0){
    document.body.style.background = "red";
  } else if(total<=30){
    document.body.style.background = "orange";
  } else {
    document.body.style.background = "green";
  }
}

// START/STOP/RESET 버튼
function toggleStartStop(){
  const btn = document.getElementById("startStopBtn");

  if(running){
    // STOP
    clearInterval(interval);
    running=false;
    stopState = true;
    btn.innerText="RESET";
    if(wakeLock){ wakeLock.release(); wakeLock=null; }
  } else if(stopState){
    // RESET
    total = lastPreset;
    initial = lastPreset;
    overtime = 0;
    stopState = false;
    btn.innerText="START";
    updateDisplay();
  } else {
    // START
    if(total===0) return;
    running=true;
    beepPlayed=false;
    btn.innerText="STOP";
    requestWakeLock();

    interval=setInterval(()=>{
      if(total>0){
        total--;
        if(total===0 && !beepPlayed){ playBeep(); beepPlayed=true; }
      } else {
        overtime++;
      }
      updateDisplay();
    },1000);
  }
}

// 비프음
function playBeep(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type="square"; o.frequency.value=1000; g.gain.value=0.1;
  o.start(); o.stop(ctx.currentTime+0.3);
}

// 프리셋 선택
function quickStart(sec, el){
  clearInterval(interval);
  total=sec; initial=sec; overtime=0; running=false; beepPlayed=false;
  stopState=false;
  lastPreset = sec;

  if(wakeLock){ wakeLock.release(); wakeLock=null; }

  document.querySelectorAll('.preset button').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');

  document.getElementById("startStopBtn").innerText="START";
  updateDisplay();
}

// 화면 회전 대응
window.addEventListener('resize', () => {
  const h = window.innerHeight;
  const w = window.innerWidth;
  const timeEl = document.getElementById("time");
  timeEl.style.fontSize = Math.min(w,h)*0.15 + "px";
});

updateDisplay();
</script>

</body>
</html>
