<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Time Keeper</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont;
  background: green;
  color: white;
  overflow: hidden;
}

.progress-container {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.2);
  position: absolute;
  top: 0;
}
.progress-bar {
  height: 100%;
  width: 100%;
  background: lime;
  transition: width 1s linear;
}

/* 시간 */
#time {
  font-size: 25vw;
  font-weight: 700;
  text-align: center;
  margin-bottom: 5vh;
  width: 100%;
}

/* 프리셋 스크롤 */
.preset-container {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 5vh;

  /* 스크롤바 숨기기 */
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.preset-container::-webkit-scrollbar {
  display: none;
}

.preset {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
  padding: 0 10px;
}

.preset button {
  flex: 0 0 auto;
  font-size: 3vw;
  padding: 1vw;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: white;
}

.preset button.active {
  background: rgba(255,255,255,0.5);
  color: black;
}

/* START/STOP/RESET 버튼 */
#startStopBtn {
  font-size: 6vw;
  width: 100%;
  padding: 2vh 4vh; /* 🔥 좌우 패딩 추가 */
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  transition: transform 0.1s;
}
#startStopBtn:active {
  transform: scale(0.97);
}
</style>
</head>
<body>

<div class="progress-container">
  <div class="progress-bar" id="progress"></div>
</div>

<div id="time">01:00</div>

<div class="preset-container">
  <div class="preset">
    <button onclick="quickStart(60,this)" class="active">1m</button>
    <button onclick="quickStart(120,this)">2m</button>
    <button onclick="quickStart(180,this)">3m</button>
    <button onclick="quickStart(240,this)">4m</button>
    <button onclick="quickStart(300,this)">5m</button>
    <button onclick="quickStart(360,this)">6m</button>
    <button onclick="quickStart(420,this)">7m</button>
    <button onclick="quickStart(480,this)">8m</button>
    <button onclick="quickStart(540,this)">9m</button>
    <button onclick="quickStart(600,this)">10m</button>
  </div>
</div>

<button id="startStopBtn" onclick="toggleStartStop()">START</button>

<script>
let total = 60;
let initial = 60;
let interval = null;
let running = false;
let beepPlayed = false;
let wakeLock = null;
let lastPreset = 60;
let stopState = false;

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock?.request('screen');
  } catch(e){}
}

function format(sec){
  const absSec = Math.abs(sec);
  let m = Math.floor(absSec/60);
  let s = absSec%60;
  let str = String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
  return sec<0 ? "-" + str : str;
}

function updateDisplay(){
  document.getElementById("time").innerText = format(total);
  let percent = total > 0 ? (total/initial)*100 : 0;
  document.getElementById("progress").style.width = percent + "%";

  if(total<=0){
    document.body.style.background = "red";
  } else if(total<=30){
    document.body.style.background = "orange";
  } else {
    document.body.style.background = "green";
  }
}

function toggleStartStop(){
  const btn = document.getElementById("startStopBtn");

  if(running){
    clearInterval(interval);
    running=false;
    stopState = true;
    btn.innerText="RESET";
    if(wakeLock){ wakeLock.release(); wakeLock=null; }
  } else if(stopState){
    total = lastPreset;
    initial = lastPreset;
    stopState = false;
    btn.innerText="START";
    updateDisplay();
  } else {
    running=true;
    beepPlayed=false;
    btn.innerText="STOP";
    requestWakeLock();

    interval=setInterval(()=>{
      total--;
      if(total===0 && !beepPlayed){ playBeep(); beepPlayed=true; }
      updateDisplay();
    },1000);
  }
}

function playBeep(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type="square"; o.frequency.value=1000; g.gain.value=0.1;
  o.start(); o.stop(ctx.currentTime+0.3);
}

function quickStart(sec, el){
  clearInterval(interval);
  total=sec;
  initial=sec;
  running=false;
  beepPlayed=false;
  stopState=false;
  lastPreset = sec;

  if(wakeLock){ wakeLock.release(); wakeLock=null; }

  document.querySelectorAll('.preset button').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');

  document.getElementById("startStopBtn").innerText="START";
  updateDisplay();
}

window.addEventListener('resize', () => {
  const h = window.innerHeight;
  const w = window.innerWidth;
  document.getElementById("time").style.fontSize = Math.min(w,h)*0.25 + "px";
});

updateDisplay();
</script>

</body>
</html>
