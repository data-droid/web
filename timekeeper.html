<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Time Keeper</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont;
    color: white;
    background: green;
    transition: background 0.3s;
    overflow: hidden;
  }

  .progress-container {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.2);
    position: absolute;
    top: 0;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: lime;
    transition: width 1s linear;
  }

  #time { 
    font-size: 18vw; 
    font-weight: 700; 
    text-align: center; 
    margin-top: 15vh;
  }

  #over { 
    font-size: 5vw; 
    margin-top: 1vh; 
    opacity: 0.8; 
  }

  .controls { 
    display: flex; 
    gap: 10px; 
    flex-wrap: wrap; 
    justify-content: center; 
    margin-top: 3vh; 
  }

  #startStopBtn {
    font-size: 7vw;
    width: 90%;
    padding: 3vh 0;
    border-radius: 20px;
    background: rgba(255,255,255,0.3);
    color: white;
  }

  .preset button {
    font-size: 4vw;
    padding: 2vh 3vw;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    color: white;
  }
  .preset button.active {
    background: white;
    color: black;
  }

  .preset {
    margin-top: auto;
    margin-bottom: 5vh;
  }
</style>
</head>
<body>

<div class="progress-container">
  <div class="progress-bar" id="progress"></div>
</div>

<!-- 시간 맨 위 -->
<div id="time">01:00</div>
<div id="over"></div>

<!-- START/STOP/RESET 버튼 -->
<div class="controls">
  <button id="startStopBtn" onclick="toggleStartStop()">START</button>
</div>

<!-- 프리셋 버튼 맨 아래 -->
<div class="controls preset">
  <button onclick="quickStart(60,this)" class="active">1m</button>
  <button onclick="quickStart(120,this)">2m</button>
  <button onclick="quickStart(180,this)">3m</button>
  <button onclick="quickStart(240,this)">4m</button>
  <button onclick="quickStart(300,this)">5m</button>
</div>

<script>
let total = 60; // 초기 1분
let initial = 60;
let overtime = 0;
let interval = null;
let running = false;
let beepPlayed = false;
let wakeLock = null;
let lastPreset = 60; // 이전 프리셋 기억
let stopState = false; // STOP 상태인지

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock?.request('screen');
    if(wakeLock) wakeLock.addEventListener('release', ()=>console.log('Wake Lock released'));
  } catch(e){ console.log('Wake Lock failed:',e); }
}

function format(sec){
  let m = Math.floor(sec/60);
  let s = sec%60;
  return String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}

function updateDisplay(){
  document.getElementById("time").innerText = format(Math.max(0,total));
  let percent = total > 0 ? (total/initial)*100 : 0;
  document.getElementById("progress").style.width = percent + "%";

  if(total<=0){
    document.body.style.background = "red";
  } else if(total<=30){
    document.body.style.background = "orange";
  } else {
    document.body.style.background = "green";
  }

  document.getElementById("over").innerText = overtime>0 ? "OVER "+format(overtime) : "";
}

// START / STOP / RESET 로직
function toggleStartStop(){
  const btn = document.getElementById("startStopBtn");

  if(running){
    // STOP
    clearInterval(interval);
    running=false;
    stopState = true;
    btn.innerText="RESET";
    if(wakeLock){ wakeLock.release(); wakeLock=null; }
  } else if(stopState){
    // RESET
    total = lastPreset;
    initial = lastPreset;
    overtime = 0;
    stopState = false;
    btn.innerText="START";
    updateDisplay();
  } else {
    // START
    if(total===0) return;
    running=true;
    beepPlayed=false;
    btn.innerText="STOP";
    requestWakeLock();

    interval=setInterval(()=>{
      if(total>0){
        total--;
        if(total===0 && !beepPlayed){ playBeep(); beepPlayed=true; }
      } else {
        overtime++;
      }
      updateDisplay();
    },1000);
  }
}

// 비프음 1회
function playBeep(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type="square"; o.frequency.value=1000; g.gain.value=0.1;
  o.start(); o.stop(ctx.currentTime+0.3);
}

// 프리셋 선택
function quickStart(sec, el){
  clearInterval(interval);
  total=sec; initial=sec; overtime=0; running=false; beepPlayed=false;
  stopState=false;
  lastPreset = sec;

  if(wakeLock){ wakeLock.release(); wakeLock=null; }

  document.querySelectorAll('.preset button').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');

  document.getElementById("startStopBtn").innerText="START";
  updateDisplay();
}

// 회전 시 폰트 재계산
window.addEventListener('resize', updateDisplay);

updateDisplay();
</script>

</body>
</html>
